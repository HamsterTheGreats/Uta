<!DOCTYPE html>
<html>

<head>
<link rel="stylesheet"
     href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin="">
</script>

<style>

        body {
                margin: 0;
        }
        #map { 
        height: 100vh; 
        width:100vw
        }
</style>

</head>

<body>

<div id="map"></div>

<script>
const bounds = [[0,0], [2470,4050]];  

        const map = L.map('map', {
         crs: L.CRS.Simple,
         minZoom: -2
    });

L.imageOverlay('utah_map.jpg', bounds).addTo(map);

map.fitBounds(bounds);

const objectivesLayer = L.layerGroup();

const bunkerLayer = L.layerGroup();

L.marker([1200, 1500]) 
    .bindPopup("<b>Штаб</b><br>Описание штаба")
    .addTo(objectivesLayer);

L.marker([1800, 3000])
    .bindPopup("<b>Бункер</b><br>Описание бункера")
    .addTo(bunkerLayer);

objectivesLayer.addTo(map);
bunkerLayer.addTo(map);

const overlayMaps = {
        "Штаб": objectivesLayer,
        "Бункеры": bunkerLayer
};

L.control.layers(null, overlayMaps).addTo(map);

</script>

</body>

</html>
