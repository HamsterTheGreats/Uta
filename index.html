<!DOCTYPE html>
<html>

<head>
<link rel="stylesheet"
     href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin="">
</script>

<style>

        body {
                margin: 0;
        }
        #map { 
        height: 100vh; 
        width:100vw
        }
</style>

</head>

<body>

<div id="map"></div>

<script>
const bounds = [[0,0], [2470,4050]];  

        const map = L.map('map', {
         crs: L.CRS.Simple,
         minZoom: -2
    });

L.imageOverlay('utah_map.jpg', bounds).addTo(map);

map.fitBounds(bounds);

const infantryLayer = L.layerGroup();
const mgLayer = L.layerGroup();
const artilleryLayer = L.layerGroup();

L.circleMarker([900, 1200], {
    radius: 6,
    color: 'lime',
    fillColor: 'lime',
    fillOpacity: 1
})
.addTo(infantryLayer)
.bindPopup("<b>Пехота #1</b><br>Хороший прострел дороги.");

L.circleMarker([1300, 1700], {
    radius: 6,
    color: 'lime',
    fillColor: 'lime',
    fillOpacity: 1
})
.addTo(infantryLayer)
.bindPopup("<b>Пехота #2</b><br>Контроль прохода через дюны.");

L.circleMarker([1600, 2600], {
    radius: 6,
    color: 'lime',
    fillColor: 'lime',
    fillOpacity: 1
})
.addTo(infantryLayer)
.bindPopup("<b>Пехота #3</b><br>Хороший обзор на траншею.");

L.circleMarker([1000, 3000], {
    radius: 7,
    color: 'brown',
    fillColor: 'brown',
    fillOpacity: 1
})
.addTo(mgLayer)
.bindPopup("<b>Пулемёт #1</b><br>Контроль открытого поля.");

L.circleMarker([1800, 2200], {
    radius: 7,
    color: 'brown',
    fillColor: 'brown',
    fillOpacity: 1
})
.addTo(mgLayer)
.bindPopup("<b>Пулемёт #2</b><br>Хорошая оборонительная позиция.");

L.circleMarker([1400, 3400], {
    radius: 8,
    color: 'red',
    fillColor: 'red',
    fillOpacity: 1
})
.addTo(artilleryLayer)
.bindPopup("<b>Артиллерия</b><br>Примерный сектор обстрела.");

L.polygon([
    [1400, 3400],
    [900, 2600],
    [1900, 2600]
], {
    color: 'red',
    fillColor: 'red',
    fillOpacity: 0.2
})
.addTo(artilleryLayer);

infantryLayer.addTo(map);
mgLayer.addTo(map);
artilleryLayer.addTo(map);

const overlayMaps = {
    "Пехота": infantryLayer,
    "Пулемёты": mgLayer,
    "Артиллерия": artilleryLayer
};

L.control.layers(null, overlayMaps).addTo(map);
</script>

</body>

</html>
