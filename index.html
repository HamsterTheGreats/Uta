<!DOCTYPE html>
<html>

<head>
<link rel="stylesheet"
     href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin="">
</script>

<style>

        body {
                margin: 0;
        }
        #map { 
        height: 100vh; 
        width:100vw
        }

    #markerType {
    position: absolute;
    top: 10px;
    left: 50px;
    z-index: 1000;

    padding: 5px;
    font-size: 16px;
}
</style>

</head>

<body>

<div id="map"></div>

<script>
const bounds = [[0,0], [2470,4050]];  

        const map = L.map('map', {
         crs: L.CRS.Simple,
         minZoom: -2
    });

L.imageOverlay('utah_map.jpg', bounds).addTo(map);

map.fitBounds(bounds);

const infantryIcon = L.icon({
    iconUrl: 'Rifleman.png',

    iconSize: [32, 32],
    iconAnchor: [16, 16],
    popupAnchor: [0, -16]
});

const mgIcon = L.icon({
    iconUrl: 'Machine_gun.png',

    iconSize: [32, 40],
    iconAnchor: [16, 16],
    popupAnchor: [0, -16]
});

const artilleryIcon = L.icon({
    iconUrl: 'Anti-tank.png',

    iconSize: [36, 36],
    iconAnchor: [18, 18],
    popupAnchor: [0, -18]
});
const engineerIcon = L.icon({
    iconUrl: 'Engineer.png',

    iconSize: [32, 32],
    iconAnchor: [16, 16],
    popupAnchor: [0, -16]
});
const garrisonIcon = L.icon({
    iconUrl: 'Garrison.png',

    iconSize: [32, 32],
    iconAnchor: [16, 16],
    popupAnchor: [0, -16]
});
const tankIcon = L.icon({
    iconUrl: 'Tank.png',

    iconSize: [32, 32],
    iconAnchor: [16, 16],
    popupAnchor: [0, -16]
});
const mineIcon = L.icon({
    iconUrl: 'Mine.png',

    iconSize: [32, 32],
    iconAnchor: [16, 16],
    popupAnchor: [0, -16]
});
const suppliesIcon = L.icon({
    iconUrl: 'Supply_drop.png',

    iconSize: [32, 45],
    iconAnchor: [16, 16],
    popupAnchor: [0, -16]
});
const truckIcon = L.icon({
    iconUrl: 'Truck.png',

    iconSize: [32, 32],
    iconAnchor: [16, 16],
    popupAnchor: [0, -16]
});

const infantryLayer = L.layerGroup();
const mgLayer = L.layerGroup();
const artilleryLayer = L.layerGroup();
const engineerLayer = L.layerGroup();
const garrisonLayer = L.layerGroup();
const tankLayer = L.layerGroup();
const mineLayer = L.layerGroup();
const suppliesLayer = L.layerGroup();
const truckLayer = L.layerGroup();

L.marker([900, 1200], {
 icon: infantryIcon
})
.addTo(infantryLayer)
.bindPopup("<b>Пехота #1</b><br>Хороший прострел дороги.");

L.marker([1300, 1700], {
 icon: infantryIcon
})
.addTo(infantryLayer)
.bindPopup("<b>Пехота #2</b><br>Контроль прохода через дюны.");

L.marker([1600, 2600], {
 icon: infantryIcon
})
.addTo(infantryLayer)
.bindPopup("<b>Пехота #3</b><br>Хороший обзор на траншею.");

L.marker([1000, 3000], {
    icon: mgIcon
})
.addTo(mgLayer)
.bindPopup("<b>Пулемёт #1</b><br>Контроль открытого поля.");

L.marker([1800, 2200], {
    icon: mgIcon
})
.addTo(mgLayer)
.bindPopup("<b>Пулемёт #2</b><br>Хорошая оборонительная позиция.");

L.marker([1400, 3400], {
    icon: artilleryIcon
})
.addTo(artilleryLayer)
.bindPopup("<b>Пт пушка</b><br>Примерный сектор обстрела.");

L.marker([700, 700], {
    icon: engineerIcon
})
.addTo(engineerLayer)
.bindPopup("<b>Инженер</b><br>Тестовая точка.");

L.marker([900, 900], {
    icon: garrisonIcon
})
.addTo(garrisonLayer)
.bindPopup("<b>Гарнизон</b><br>Тестовая точка.");

L.marker([1100, 1100], {
    icon: tankIcon
})
.addTo(tankLayer)
.bindPopup("<b>Танк</b><br>Тестовая точка.");

L.marker([1300, 1300], {
    icon: mineIcon
})
.addTo(mineLayer)
.bindPopup("<b>Мины</b><br>Тестовая точка.");

L.marker([1500, 1500], {
    icon: suppliesIcon
})
.addTo(suppliesLayer)
.bindPopup("<b>Припасы</b><br>Тестовая точка.");

L.marker([1700, 1700], {
    icon: truckIcon
})
.addTo(truckLayer)
.bindPopup("<b>Грузовик</b><br>Тестовая точка.");

L.polygon([
    [1400, 3400],
    [900, 2600],
    [1900, 2600]
], {
    color: 'red',
    fillColor: 'red',
    fillOpacity: 0.2
})
.addTo(artilleryLayer);

infantryLayer.addTo(map);
mgLayer.addTo(map);
artilleryLayer.addTo(map);
engineerLayer.addTo(map);
garrisonLayer.addTo(map);
tankLayer.addTo(map);
mineLayer.addTo(map);
suppliesLayer.addTo(map);
truckLayer.addTo(map);

const overlayMaps = {
    "Пехота": infantryLayer,
    "Пулемёты": mgLayer,
    "Пт пушка": artilleryLayer,
    "Инженеры": engineerLayer,
    "Гарнизоны": garrisonLayer,
    "Танки": tankLayer,
    "Мины": mineLayer,
    "Припасы": suppliesLayer,
    "Грузовики": truckLayer
};

L.control.layers(null, overlayMaps).addTo(map);
</script>

<script>

map.on('click', function(e) {

    const type = document.getElementById('markerType').value;

    let selectedIcon;
    let selectedLayer;
    let popupText;

    if (type === 'infantry') {
        selectedIcon = infantryIcon;
        selectedLayer = infantryLayer;
        popupText = "Пехота";
    }

    if (type === 'mg') {
        selectedIcon = mgIcon;
        selectedLayer = mgLayer;
        popupText = "Пулемёт";
    }

    if (type === 'artillery') {
        selectedIcon = artilleryIcon;
        selectedLayer = artilleryLayer;
        popupText = "Пт пушка";
    }

    if (type === 'engineer') {
        selectedIcon = engineerIcon;
        selectedLayer = engineerLayer;
        popupText = "Инженер";
    }

    if (type === 'tank') {
        selectedIcon = tankIcon;
        selectedLayer = tankLayer;
        popupText = "Танк";
    }

    if (type === 'garrison') {
        selectedIcon = garrisonIcon;
        selectedLayer = garrisonLayer;
        popupText = "Гарнизон";
    }

    if (type === 'mine') {
        selectedIcon = mineIcon;
        selectedLayer = mineLayer;
        popupText = "Мины";
    }

    if (type === 'supplies') {
        selectedIcon = suppliesIcon;
        selectedLayer = suppliesLayer;
        popupText = "Припасы";
    }

    if (type === 'truck') {
        selectedIcon = truckIcon;
        selectedLayer = truckLayer;
        popupText = "Грузовик";
    }

    L.marker(e.latlng, {
        icon: selectedIcon
    })
    .addTo(selectedLayer)
    .bindPopup("<b>" + popupText + "</b><br>Новая точка.")
    .openPopup();

newMarker.on('contextmenu', function( ){
    selectedLayer.removeLayer(newMarker);
});

});

</script>

<select id="markerType">
    <option value="infantry">Пехота</option>
    <option value="mg">Пулемёт</option>
    <option value="artillery">Пт пушка</option>
    <option value="engineer">Инженер</option>
    <option value="tank">Танк</option>
    <option value="garrison">Гарнизон</option>
    <option value="mine">Мины</option>
    <option value="supplies">Сброс припасов</option>
    <option value="truck">Грузовик</option>
</select>

</body>

</html>
